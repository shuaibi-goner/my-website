<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | 我的作品集</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">MY PORTFOLIO</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于我</a></li>
                <li><a href="portfolio.html">作品集</a></li>
                <li><a href="contact.html">联系我</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="animate-fade-in">你好，我是 <span class="highlight">J</span></h1>
                <p class="tagline animate-fade-in-delay">学生 · 学习者 · 探索者</p>
                <div class="cta-buttons animate-fade-in-delay-2">
                    <a href="portfolio.html" class="btn btn-primary">查看作品</a>
                    <a href="contact.html" class="btn btn-secondary">联系我</a>
                </div>
            </div>
            <div class="scroll-indicator">
                <span>向下滚动</span>
                <div class="scroll-arrow"></div>
            </div>
        </section>

        <section class="features">
            <div class="container">
                <h2>欢迎来到我的个人网站</h2>
                <p class="section-subtitle">这里展示我的学习经历和作品</p>
                <div class="feature-grid">
                    <div class="feature-card">
                        <div class="feature-icon">📚</div>
                        <h3>我的学习</h3>
                        <p>记录医学、传播学等相关专业的学习笔记和心得</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">💡</div>
                        <h3>项目作品</h3>
                        <p>展示各类课程项目、实践作业和个人作品</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">🎯</div>
                        <h3>未来规划</h3>
                        <p>分享我的职业规划和成长目标</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="stats">
            <div class="container">
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-number" data-count="3">0</span>
                        <span class="stat-label">个专业方向</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" data-count="10">0</span>
                        <span class="stat-label">+ 课程项目</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" data-count="5">0</span>
                        <span class="stat-label">+ 学习技能</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">MY PORTFOLIO</div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于</a>
                    <a href="portfolio.html">作品</a>
                    <a href="contact.html">联系</a>
                </div>
                <p class="copyright">© 2026 J. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
