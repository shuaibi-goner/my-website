<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 | 个人主页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">MY PORTFOLIO</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我</a></li>
                <li><a href="portfolio.html">作品集</a></li>
                <li><a href="contact.html" class="active">联系我</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>联系我</h1>
            <p>欢迎与我交流与合作</p>
        </section>

        <section class="contact-content">
            <div class="container">
                <div class="contact-grid">
                    <div class="contact-info">
                        <h2>联系方式</h2>
                        <p class="contact-intro">如果你有任何问题或想与我合作，欢迎通过以下方式联系我</p>

                        <div class="contact-methods">
                            <div class="contact-method">
                                <div class="method-icon">📧</div>
                                <div class="method-details">
                                    <h3>邮箱</h3>
                                    <p>your.email@example.com</p>
                                </div>
                            </div>

                            <div class="contact-method">
                                <div class="method-icon">📱</div>
                                <div class="method-details">
                                    <h3>微信</h3>
                                    <p>your-wechat-id</p>
                                </div>
                            </div>

                            <div class="contact-method">
                                <div class="method-icon">🏫</div>
                                <div class="method-details">
                                    <h3>学校</h3>
                                    <p>某某大学</p>
                                </div>
                            </div>
                        </div>

                        <div class="social-links">
                            <h3>社交媒体</h3>
                            <div class="social-icons">
                                <a href="#" class="social-icon" title="微信">💬</a>
                                <a href="#" class="social-icon" title="QQ">🐧</a>
                                <a href="#" class="social-icon" title="邮箱">📧</a>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form-wrapper">
                        <h2>发送消息</h2>
                        <form class="contact-form" id="contactForm">
                            <div class="form-group">
                                <label for="name">姓名</label>
                                <input type="text" id="name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="subject">主题</label>
                                <input type="text" id="subject" name="subject" required>
                            </div>
                            <div class="form-group">
                                <label for="message">留言内容</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">发送消息</button>
                        </form>
                    </div>
                </div>

                <div class="contact-map">
                    <h2>我的位置</h2>
                    <div class="map-placeholder">
                        <span>📍 某某大学</span>
                        <p>这里可以嵌入地图组件</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">MY PORTFOLIO</div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于</a>
                    <a href="portfolio.html">作品</a>
                    <a href="contact.html">联系</a>
                </div>
                <p class="copyright">© 2026 J. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
